<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f6f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:50px 40px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
            width:380px;
            position:relative;
            overflow:hidden;
        }

        .card::before{
            content:"";
            position:absolute;
            top:-40px;
            right:-40px;
            width:120px;
            height:120px;
            background:rgba(11,93,59,0.1);
            border-radius:50%;
        }

        h1{
            color:#0b5d3b;
            font-size:24px;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:14px;
            margin-bottom:25px;
        }

        a{
            display:inline-block;
            padding:12px 20px;
            background:#0b5d3b;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:0.3s;
        }

        a:hover{
            background:#08442c;
            transform:translateY(-2px);
        }

        .icon{
            font-size:40px;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="icon">🎉</div>

        <h1>Order Placed Successfully</h1>

        <p>Thank you for shopping with Elegance. Your order has been confirmed.</p>

        <a href="/">Go Back Home</a>

    </div>

</body>
</html>
